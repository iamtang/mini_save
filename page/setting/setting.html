<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <style>
        :root {
            --primary-color: #2196f3;
            --primary-light: #64b5f6;
            --primary-dark: #1976d2;
            --secondary-color: #ff4081;
            --background-color: #fafafa;
            --surface-color: #ffffff;
            --text-primary: #212121;
            --text-secondary: #757575;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--background-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .content {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        .tab-content {
            width: 100%;
            max-width: 600px;
            background: var(--surface-color);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 2rem;
            border: 1px solid var(--border-color);
        }

        .tab-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-secondary);
            min-width: 140px;
            font-size: 0.95rem;
        }

        .form-group input {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            background-color: var(--background-color);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
            background-color: var(--surface-color);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .buttons {
            display: flex;
            justify-content: center;
            padding: 1.5rem 2rem 2rem;
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
        }

        button {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 500;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            min-width: 100px;
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        button:active {
            transform: translateY(0);
            background-color: var(--primary-dark);
        }

 
        /* 响应式设计 */
        @media (max-width: 600px) {
            .content {
                padding: 1rem;
            }

            .tab-content {
                padding: 1.5rem;
            }

            .form-group {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            .form-group label {
                min-width: auto;
                font-size: 0.875rem;
            }

            .buttons {
                padding: 1rem;
            }

            button {
                width: 100%;
            }
        }

        /* 添加输入框聚焦时的动画 */
        @keyframes inputFocus {
            0% {
                box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.2);
            }
            100% {
                box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
            }
        }

        .form-group input:focus {
            animation: inputFocus 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="content" id="content">
        <div id="general" class="tab-content">
            <h2>通用设置</h2>
            <div class="form-group">
                <label for="SERVER_ADDRESS">服务端地址</label>
                <input type="text" id="SERVER_ADDRESS" placeholder="为空既为服务端">
            </div>
            <div class="form-group">
                <label for="CREDENTIAL">口令</label>
                <input type="text" id="CREDENTIAL" maxlength="6" placeholder="请输入6位口令">
            </div>
            <div class="form-group">
                <label for="MAX_TEXT_NUMBER">文本最大条数</label>
                <input type="number" id="MAX_TEXT_NUMBER" value="20" placeholder="默认：20">
            </div>
            <div class="form-group">
                <label for="MAX_FILE_NUMBER">文件最大个数</label>
                <input type="number" id="MAX_FILE_NUMBER" value="10" placeholder="默认：10">
            </div>
            <div class="form-group">
                <label for="MAX_FILE_SIZE">文件最大大小 (MB)</label>
                <input type="number" id="MAX_FILE_SIZE" value="3" placeholder="默认：3">
            </div>
        </div>
    </div>
    <div class="buttons">
        <button id="applyButton">应用设置</button>
    </div>

    <script>
        window.electronAPI.loadSettings().then(settings => {
            document.getElementById('SERVER_ADDRESS').value = settings.SERVER_ADDRESS || '';
            document.getElementById('CREDENTIAL').value = settings.CREDENTIAL || '';
            document.getElementById('MAX_TEXT_NUMBER').value = settings.MAX_TEXT_NUMBER || '';
            document.getElementById('MAX_FILE_NUMBER').value = settings.MAX_FILE_NUMBER || '';
            document.getElementById('MAX_FILE_SIZE').value = settings.MAX_FILE_SIZE || '';
        });

        document.getElementById('applyButton').addEventListener('click', () => {
            const settings = {
                SERVER_ADDRESS: document.getElementById('SERVER_ADDRESS').value,
                CREDENTIAL: document.getElementById('CREDENTIAL').value,
                MAX_TEXT_NUMBER: document.getElementById('MAX_TEXT_NUMBER').value,
                MAX_FILE_NUMBER: document.getElementById('MAX_FILE_NUMBER').value,
                MAX_FILE_SIZE: document.getElementById('MAX_FILE_SIZE').value,
            };

            // 添加按钮点击反馈动画
            const button = document.getElementById('applyButton');
            button.style.transform = 'scale(0.95)';
            setTimeout(() => {
                button.style.transform = '';
            }, 100);

            // Send settings to the main process
            window.electronAPI.saveSettings(settings);
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                window.electronAPI.hideSettings();
            }
            if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
                document.getElementById('applyButton').click();
            }
        });
    </script>
</body>
</html>
